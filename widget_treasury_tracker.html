<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: transparent; color: #e0e0e0; }
        .treasury-container {
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 25px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .title { font-size: 1rem; font-weight: 600; letter-spacing: 1px; color: #c5a059; display: flex; align-items: center; gap: 8px; }
        .live-badge { background: rgba(0, 200, 83, 0.1); color: #00c853; font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(0, 200, 83, 0.3); }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .metric-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 8px; text-align: center; }
        .metric-title { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .metric-value { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 700; color: #fff; }
        .metric-value.gold { color: #c5a059; text-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        .metric-sub { font-size: 0.75rem; color: #555; margin-top: 5px; }
        
        .progress-container { margin-top: 10px; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #c5a059; width: 0%; animation: loadBar 2s ease-out forwards; }
        @keyframes loadBar { to { width: 1.5%; } }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #888; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="treasury-container">
        <div class="header-row">
            <div class="title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>
                TREASURY STATUS
            </div>
            <div class="live-badge">REAL-TIME SYNC</div>
        </div>
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-title">Monthly CapEx Burn</div>
                <div class="metric-value gold">$0.00</div>
                <div class="metric-sub">Target: $0.00 | Bootstrapped Mandate</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Vercel / API Micro-Spend</div>
                <div class="metric-value" id="microSpend">$0.00</div>
                <div class="metric-sub">Serverless Operations Cost</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Year 1 Target GWP</div>
                <div class="metric-value" style="color: #00c853;">$6.00M</div>
                <div class="metric-sub">Gross Written Premium Goal</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Break-Even Velocity</div>
                <div class="metric-value">5,000</div>
                <div class="metric-sub">Active User Base Target</div>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="progress-label">
                <span>Free Tier Consumption</span>
                <span>1.5%</span>
            </div>
        </div>
    </div>
    <script>
        // Animate the micro-spend dynamically for "live" feel
        let start = 0.00;
        const target = 0.35; // Reflects the $0.35 usage mentioned by the user
        const duration = 2000;
        const stepTime = 20;
        const steps = duration / stepTime;
        const increment = target / steps;
        
        const spendEl = document.getElementById('microSpend');
        const timer = setInterval(() => {
            start += increment;
            if(start >= target) { start = target; clearInterval(timer); }
            spendEl.innerText = '$' + start.toFixed(2);
        }, stepTime);
    </script>
</body>
</html>

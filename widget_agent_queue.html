<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: transparent; color: #e0e0e0; }
        .queue-container {
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 25px;
            display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            height: 350px; overflow: hidden;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .title { font-size: 1rem; font-weight: 600; color: #c5a059; display: flex; align-items: center; gap: 8px; }
        
        .terminal {
            background: #050505; border: 1px solid #1a1a1a; border-radius: 8px; padding: 15px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; flex-grow: 1;
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .log-entry { opacity: 0; animation: fadeIn 0.3s forwards; display: flex; gap: 10px; }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .timestamp { color: #555; }
        .agent-tag { color: #c5a059; }
        .message { color: #ccc; }
        .status-done { color: #00c853; }
        .status-warn { color: #ffab00; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="queue-container">
        <div class="header">
            <div class="title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                ACTIVE AGENTIC WORKFLOWS
            </div>
            <div style="font-size: 0.75rem; color: #888;">Live Telemetry</div>
        </div>
        <div class="terminal" id="terminalLog">
            <!-- JS will inject logs here -->
        </div>
    </div>
    <script>
        const logs = [
            { agent: "IAM_Subagent", msg: "Verified Executive Identity (COO). Permissions: ROOT.", status: "status-done", text: "[OK]" },
            { agent: "Treasury_Agent", msg: "Scraping Vercel API for daily micro-spend anomalies...", status: "status-warn", text: "[WORKING]" },
            { agent: "Oracle_Bridge", msg: "Connection to Gemini REST API stabilized. Latency: 140ms.", status: "status-done", text: "[OK]" },
            { agent: "Browser_Automator", msg: "Injected Master Template widgets into Intranet DOM.", status: "status-done", text: "[OK]" },
            { agent: "BallParks_Sim", msg: "Awaiting next sensor data packet from Albert's Field...", status: "status-warn", text: "[POLLING]" }
        ];

        const terminal = document.getElementById('terminalLog');
        
        function addLog(message, status = 'status-done', tag = 'SYSTEM') {
            const div = document.createElement('div');
            div.className = 'log-entry';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            div.innerHTML = `
                <span class="timestamp">[${time}]</span>
                <span class="agent-tag">&lt;${tag}&gt;</span>
                <span class="message">${message}</span>
                <span class="${status}">[LIVE]</span>
            `;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function fetchLiveTelemetry() {
            try {
                const response = await fetch('https://chainmail-customer-app-interface.vercel.app/api/agents/telemetry');
                if (!response.ok) throw new Error('API Sync Error');
                const data = await response.json();
                
                const randomMsg = data[Math.floor(Math.random() * data.length)];
                addLog(randomMsg.msg, 'status-done', randomMsg.id);
            } catch (err) {
                const fallbackLogs = [
                    "[SYSTEM] Falling back to offline memory cache...",
                    "[ORCL-00] Re-verifying Automated Policy settlement layer...",
                    "[IAM-99] Validating OAuth tokens for CTO Dashboard...",
                    "[SIM-42] BallParks Initiative wind sensors read 142mph."
                ];
                addLog(fallbackLogs[Math.floor(Math.random() * fallbackLogs.length)], 'status-warn', 'CACHE');
            }
        }

        setInterval(fetchLiveTelemetry, 2500);
        fetchLiveTelemetry();
    </script>
</body>
</html>
